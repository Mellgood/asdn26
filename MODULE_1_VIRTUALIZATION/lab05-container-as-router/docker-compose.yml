services:
  host-a:
    # TODO: Use your local 'net-tools' image
    container_name: asdn-host-a
    # TODO: Add capability NET_ADMIN (needed to manipulate the routing table)
    cap_add:
      - NET_ADMIN
    # TODO: Attach to net-alpha with IP 10.5.1.10
    
    # We override the default command so the container stays alive, 
    # but you'll modify this in Task 5 to also inject routes.
    command: tail -f /dev/null

  host-b:
    # TODO: Use your local 'net-tools' image
    container_name: asdn-host-b
    cap_add:
      - NET_ADMIN
    # TODO: Attach to net-beta with IP 10.5.2.10
    
    command: tail -f /dev/null

  router:
    # TODO: Use your local 'net-tools' image
    container_name: asdn-router
    cap_add:
      - NET_ADMIN
    # TODO: Attach to BOTH net-alpha (10.5.1.1) and net-beta (10.5.2.1)
    
    # TODO: In Task 5, uncomment the lines below to mount and run the init script
    # volumes:
    #   - ./router-init.sh:/router-init.sh:ro
    # command: bash -c "/router-init.sh && tail -f /dev/null"
    command: tail -f /dev/null

