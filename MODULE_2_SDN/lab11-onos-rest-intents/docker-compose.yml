version: '3.8'

services:
  onos:
    image: onosproject/onos:2.7.0
    container_name: asdn_onos_lab11
    # Disable default reactive forwarding so the network is blank
    environment:
      - ONOS_APPS=drivers,openflow,gui2
    ports:
      - "8181:8181"   
      - "6653:6653"   
    networks:
      - sdn_net

  mininet:
    build:
      context: ../docker
      dockerfile: Dockerfile.sdn
    container_name: asdn_mininet_lab11
    privileged: true
    stdin_open: true
    tty: true
    volumes:
      - .:/lab
      - /lib/modules:/lib/modules:ro
    networks:
      - sdn_net

networks:
  sdn_net:
